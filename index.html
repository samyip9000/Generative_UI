<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Greeting</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-weather="loading">
  <!-- Static themed scene: shown while AI loads, and as a fallback if AI fails. -->
  <div class="scene">
    <div class="sky"></div>
    <div class="sun"></div>
    <div class="moon"></div>
    <div class="clouds">
      <span class="cloud cloud-1"></span>
      <span class="cloud cloud-2"></span>
      <span class="cloud cloud-3"></span>
    </div>
    <div class="rain"></div>
    <div class="snow"></div>
    <div class="stars"></div>
  </div>

  <main class="card" id="fallback-card">
    <p class="eyebrow" id="time-of-day">Hello</p>
    <h1 class="greeting" id="greeting">Loading your day…</h1>
    <p class="subtitle" id="subtitle">Asking the AI to design today's greeting.</p>

    <div class="weather" id="weather" hidden>
      <div class="weather-icon" id="weather-icon">·</div>
      <div class="weather-info">
        <div class="temp" id="temp">—</div>
        <div class="desc" id="desc">—</div>
        <div class="location" id="location">—</div>
      </div>
    </div>

    <p class="error" id="error" hidden></p>
  </main>

  <!-- AI-generated UI gets injected here. Sandboxed: no scripts, no top-nav. -->
  <iframe id="ai-frame" sandbox="" hidden title="AI-generated weather greeting"></iframe>

  <button id="regenerate" class="regen" hidden title="Generate a new design">↻ Regenerate</button>
  <div id="model-badge" class="model-badge" hidden></div>

  <script src="app.js"></script>
</body>
</html>
