<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Greeting</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-weather="loading">
  <div class="scene">
    <div class="sky"></div>
    <div class="sun"></div>
    <div class="moon"></div>
    <div class="clouds">
      <span class="cloud cloud-1"></span>
      <span class="cloud cloud-2"></span>
      <span class="cloud cloud-3"></span>
    </div>
    <div class="rain"></div>
    <div class="snow"></div>
    <div class="stars"></div>
  </div>

  <main class="card">
    <p class="eyebrow" id="time-of-day">Hello</p>
    <h1 class="greeting" id="greeting">Loading your day…</h1>
    <p class="subtitle" id="subtitle">Checking the sky above you.</p>

    <div class="weather" id="weather" hidden>
      <div class="weather-icon" id="weather-icon">·</div>
      <div class="weather-info">
        <div class="temp" id="temp">—</div>
        <div class="desc" id="desc">—</div>
        <div class="location" id="location">—</div>
      </div>
    </div>

    <p class="error" id="error" hidden></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
